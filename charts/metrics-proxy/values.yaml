replicaCount: 1

image:
  repository: ghcr.io/joluc/metrics-proxy
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: metrics-proxy.joluc.de
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 50m
    memory: 64Mi
  requests:
    cpu: 10m
    memory: 32Mi

env:
  THANOS_URL: "http://thanos-query-frontend.thanos.svc.cluster.local:9090"
  ALLOWED_ORIGINS: ""

config:
  metrics:
    - id: water_islands_brygge
      label: "Water · Islands Brygge"
      unit: "°C"
      query: 'badevand_water_temperature_celsius{site_id="badevand_Islands_Brygge_Havnebad"}'
    - id: air_copenhagen
      label: "Air · Copenhagen"
      unit: "°C"
      query: 'weather_temperature_celsius{city="Copenhagen"}'
    - id: pi_temps
      label: "Pi Temps · Cluster"
      unit: "°C"
      query: 'node_thermal_zone_temp{type="cpu-thermal"}'
    - id: icebreakers_moving
      label: "Icebreakers · Baltic"
      unit: "ships"
      query: 'count(icebreaker_speed_over_ground_knots > 0)'
    - id: pods_running
      label: "Pods · Homelab"
      unit: "pods"
      query: 'count(kube_pod_status_phase{phase="Running"})'
    - id: cluster_cpu
      label: "CPU · Cluster"
      unit: "%"
      query: '100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])))'
    - id: network_rx
      label: "Traffic In · Cluster"
      unit: "MB/s"
      query: 'sum(rate(node_network_receive_bytes_total{device=~"eth.*|enp.*"}[5m])) / 1024 / 1024'

nodeSelector: {}

tolerations: []

affinity: {}
