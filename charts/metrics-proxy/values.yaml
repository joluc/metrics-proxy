replicaCount: 1

image:
  repository: ghcr.io/joluc/metrics-proxy
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: metrics-proxy.joluc.de
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 50m
    memory: 64Mi
  requests:
    cpu: 10m
    memory: 32Mi

env:
  THANOS_URL: "http://thanos-query-frontend.thanos.svc.cluster.local:9090"
  ALLOWED_ORIGINS: ""

nodeSelector: {}

tolerations: []

affinity: {}
